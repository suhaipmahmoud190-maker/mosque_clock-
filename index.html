<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>ساعة المسجد - دمشق</title>
    <style>
        * { box-sizing: border-box; }
        html, body {
            background: #000; color: #fff; font-family: sans-serif;
            text-align: center; margin: 0; padding: 0;
            width: 100%; min-height: 100vh;
        }
        .wrapper {
            max-width: 600px; margin: 0 auto;
            padding: 5vh 20px;
            min-height: 100vh;
            display: flex; flex-direction: column; justify-content: center;
        }
        .label { font-size: clamp(0.8em, 2.5vw, 1.1em); color: #aaa; margin-bottom: 4px; }
        .main-time {
            font-size: clamp(2.2em, 10vw, 4.5em);
            color: #ffcc00; margin-bottom: 6px; direction: ltr;
            font-variant-numeric: tabular-nums;
        }
        .countdown-box { margin-bottom: 5vh; }
        .next-name { font-size: clamp(1.1em, 4vw, 1.8em); color: #66ff99; margin-bottom: 4px; }
        .countdown {
            font-size: clamp(1.6em, 7vw, 2.8em);
            color: #66ff99; direction: ltr;
            font-variant-numeric: tabular-nums;
        }
        .timesList { max-width: 420px; width: 100%; margin: 0 auto; }
        .prayer-row {
            display: flex; justify-content: space-between;
            font-size: clamp(1.1em, 4vw, 1.6em);
            border-bottom: 1px solid #333; padding: 10px 6px;
        }
        .prayer-row.active { color: #ffcc00; font-weight: bold; border-bottom: 1px solid #ffcc00; }
        .time-val { direction: ltr; }
        #citySelect {
            background: #1a1d27; color: #ffcc00; border: 1px solid #444;
            border-radius: 8px; padding: 8px 14px; font-size: clamp(1em, 3vw, 1.3em);
            margin-bottom: 4vh; font-family: inherit; text-align: center;
        }

        /* شاشات كبيرة جداً (تلفزيون / شاشة عرض في المسجد) */
        @media (min-width: 1000px) {
            .wrapper { max-width: 900px; }
            .main-time { font-size: 6em; }
            .countdown { font-size: 3.2em; }
            .timesList { max-width: 600px; }
            .prayer-row { font-size: 1.9em; padding: 14px 10px; }
        }
    </style>
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="ساعة المسجد">
</head>
<body>
    <div class="wrapper">
        <div class="label">المدينة</div>
        <select id="citySelect" onchange="onCityChange()">
            <option value="damascus">دمشق</option>
            <option value="aleppo">حلب</option>
            <option value="homs">حمص</option>
            <option value="hama">حماة</option>
            <option value="lattakia">اللاذقية</option>
            <option value="idlib">إدلب</option>
            <option value="daraa">درعا</option>
            <option value="deirezzor">دير الزور</option>
            <option value="raqqa">الرقة</option>
            <option value="hasakah">الحسكة</option>
            <option value="qamishli">القامشلي</option>
            <option value="tartus">طرطوس</option>
            <option value="sweida">السويداء</option>
            <option value="quneitra">القنيطرة</option>
        </select>

        <div class="label">الوقت الحالي</div>
        <div id="currentTime" class="main-time">00:00:00</div>

        <div class="countdown-box">
            <div class="label">الصلاة القادمة</div>
            <div id="nextName" class="next-name">--</div>
            <div class="label">الوقت المتبقي</div>
            <div id="countdown" class="countdown">00:00:00</div>
        </div>

        <div id="timesList" class="timesList"></div>
    </div>

    <script>
        /**
         * حساب مواقيت الصلاة باستخدام معادلات فلكية حقيقية
         * (ميل الشمس Declination + معادلة الزمن Equation of Time)
         * بدلاً من المعادلة التقريبية السابقة - النتائج الآن مطابقة
         * تقريباً لما يظهر في جوجل والمواقع المعتمدة (فارق ثوانٍ بسبب اختلاف زاوية الفجر/العشاء المعتمدة)
         */

        // ---- قاعدة بيانات المدن السورية (إحداثيات دقيقة) ----
        const CITIES = {
            damascus:  { name: "دمشق",      lat: 33.5138, lng: 36.2765 },
            aleppo:    { name: "حلب",       lat: 36.2021, lng: 37.1343 },
            homs:      { name: "حمص",       lat: 34.7324, lng: 36.7137 },
            hama:      { name: "حماة",      lat: 35.1318, lng: 36.7578 },
            lattakia:  { name: "اللاذقية",   lat: 35.5317, lng: 35.7915 },
            idlib:     { name: "إدلب",      lat: 35.9306, lng: 36.6339 },
            daraa:     { name: "درعا",      lat: 32.6189, lng: 36.1021 },
            deirezzor: { name: "دير الزور",  lat: 35.3359, lng: 40.1408 },
            raqqa:     { name: "الرقة",     lat: 35.9594, lng: 39.0089 },
            hasakah:   { name: "الحسكة",    lat: 36.5024, lng: 40.7477 },
            qamishli:  { name: "القامشلي",   lat: 37.0522, lng: 41.2186 },
            tartus:    { name: "طرطوس",     lat: 34.8893, lng: 35.8866 },
            sweida:    { name: "السويداء",   lat: 32.7094, lng: 36.5694 },
            quneitra:  { name: "القنيطرة",   lat: 33.1264, lng: 35.8244 }
        };

        const TIMEZONE = 3; // توقيت سوريا UTC+3 (موحّد لكل المدن، بدون توقيت صيفي)

        let currentCity = localStorage.getItem('selectedCity') || 'damascus';
        let LAT = CITIES[currentCity].lat;
        let LNG = CITIES[currentCity].lng;

        function onCityChange() {
            const select = document.getElementById('citySelect');
            currentCity = select.value;
            localStorage.setItem('selectedCity', currentCity);
            LAT = CITIES[currentCity].lat;
            LNG = CITIES[currentCity].lng;
            update();
        }

        // زوايا الحساب (نفس طريقة رابطة العالم الإسلامي - المستخدمة بشكل شائع في الشام)
        const FAJR_ANGLE = 18;
        const ISHA_ANGLE = 17;
        const ASR_FACTOR = 1; // الشافعي = 1، الحنفي = 2

        // ---- دوال رياضية بالدرجات ----
        const DEG2RAD = Math.PI / 180;
        const Dsin = (d) => Math.sin(d * DEG2RAD);
        const Dcos = (d) => Math.cos(d * DEG2RAD);
        const Dtan = (d) => Math.tan(d * DEG2RAD);
        const Darcsin = (x) => Math.asin(x) / DEG2RAD;
        const Darccos = (x) => Math.acos(x) / DEG2RAD;
        const Darctan2 = (y, x) => Math.atan2(y, x) / DEG2RAD;
        const Darccot = (x) => Math.atan2(1, x) / DEG2RAD;
        const fixAngle = (a) => { a = a % 360; return a < 0 ? a + 360 : a; };
        const fixHour = (h) => { h = h % 24; return h < 0 ? h + 24 : h; };

        function julianDate(year, month, day) {
            if (month <= 2) { year -= 1; month += 12; }
            const A = Math.floor(year / 100);
            const B = 2 - A + Math.floor(A / 4);
            return Math.floor(365.25 * (year + 4716)) + Math.floor(30.6001 * (month + 1)) + day + B - 1524.5;
        }

        function sunPosition(jd) {
            const D = jd - 2451545.0;
            const g = fixAngle(357.529 + 0.98560028 * D);
            const q = fixAngle(280.459 + 0.98564736 * D);
            const L = fixAngle(q + 1.915 * Dsin(g) + 0.020 * Dsin(2 * g));
            const e = 23.439 - 0.00000036 * D;
            const RA = Darctan2(Dcos(e) * Dsin(L), Dcos(L)) / 15;
            const eqt = q / 15 - fixHour(RA);
            const decl = Darcsin(Dsin(e) * Dsin(L));
            return { declination: decl, equation: eqt };
        }

        // وقت ميل الشمس لزاوية معينة تحت/فوق الأفق
        function sunAngleTime(angle, decl, lat) {
            const val = (-Dsin(angle) - Dsin(lat) * Dsin(decl)) / (Dcos(lat) * Dcos(decl));
            return Darccos(val) / 15;
        }

        // وقت العصر حسب طول الظل
        function asrTime(factor, decl, lat) {
            const angle = -Darccot(factor + Dtan(Math.abs(lat - decl)));
            return sunAngleTime(angle, decl, lat);
        }

        function computePrayerTimes(date) {
            const jd = julianDate(date.getFullYear(), date.getMonth() + 1, date.getDate());
            const { declination: decl, equation: eqt } = sunPosition(jd - LNG / (15 * 24));

            const dhuhr = fixHour(12 - LNG / 15 - eqt + TIMEZONE - LNG / 15 * 0 + LNG / 15); // مبسّطة أدناه
            // إعادة حساب الظهر بالطريقة الصحيحة:
            const dhuhrTime = fixHour(12 + TIMEZONE - LNG / 15 - eqt);

            const fajrOffset = sunAngleTime(FAJR_ANGLE, decl, LAT);
            const sunriseOffset = sunAngleTime(0.833, decl, LAT);
            const asrOffset = asrTime(ASR_FACTOR, decl, LAT);
            const maghribOffset = sunAngleTime(0.833, decl, LAT);
            const ishaOffset = sunAngleTime(ISHA_ANGLE, decl, LAT);

            return {
                "الفجر": fixHour(dhuhrTime - fajrOffset),
                "الشروق": fixHour(dhuhrTime - sunriseOffset),
                "الظهر": dhuhrTime,
                "العصر": fixHour(dhuhrTime + asrOffset),
                "المغرب": fixHour(dhuhrTime + maghribOffset),
                "العشاء": fixHour(dhuhrTime + ishaOffset)
            };
        }

        function formatTime(t) {
            let h = Math.floor(t);
            let m = Math.round((t - h) * 60);
            if (m === 60) { m = 0; h += 1; }
            h = h % 24;
            const period = h >= 12 ? "م" : "ص";
            let h12 = h % 12;
            if (h12 === 0) h12 = 12;
            return h12 + ":" + (m < 10 ? "0" : "") + m + " " + period;
        }

        function timeToDate(baseDate, decimalHour) {
            const d = new Date(baseDate);
            d.setHours(0, 0, 0, 0);
            d.setMilliseconds(decimalHour * 60 * 60 * 1000);
            return d;
        }

        function update() {
            const now = new Date();

            // الساعة الحالية - نظام 24 ساعة
            document.getElementById('currentTime').innerText = now.toLocaleTimeString('ar-EG', { hour12: true });

            const times = computePrayerTimes(now);
            const order = ["الفجر", "الشروق", "الظهر", "العصر", "المغرب", "العشاء"];

            // بناء قائمة بأوقات Date كاملة لليوم
            let dateTimes = order.map(name => ({ name, decimal: times[name], date: timeToDate(now, times[name]) }));

            // تحديد الصلاة القادمة (نتجاهل الشروق لأنها ليست صلاة)
            const prayerOnly = dateTimes.filter(t => t.name !== "الشروق");

            let next = prayerOnly.find(t => t.date > now);
            if (!next) {
                // كل الصلوات انتهت - القادمة هي فجر الغد
                const tomorrow = new Date(now);
                tomorrow.setDate(tomorrow.getDate() + 1);
                const tTimes = computePrayerTimes(tomorrow);
                next = { name: "الفجر", date: timeToDate(tomorrow, tTimes["الفجر"]) };
            }

            const diffMs = next.date - now;
            const diffSec = Math.max(0, Math.floor(diffMs / 1000));
            const hh = Math.floor(diffSec / 3600);
            const mm = Math.floor((diffSec % 3600) / 60);
            const ss = diffSec % 60;
            const pad = (n) => (n < 10 ? "0" : "") + n;

            document.getElementById('nextName').innerText = next.name;
            document.getElementById('countdown').innerText = `${pad(hh)}:${pad(mm)}:${pad(ss)}`;

            // عرض القائمة مع تمييز الصلاة القادمة
            let html = "";
            for (let t of dateTimes) {
                const isActive = (t.name === next.name);
                html += `<div class='prayer-row${isActive ? " active" : ""}'><span>${t.name}</span><span class="time-val">${formatTime(t.decimal)}</span></div>`;
            }
            document.getElementById('timesList').innerHTML = html;
        }

        setInterval(update, 1000);
        document.getElementById('citySelect').value = currentCity;
        update();

        // تسجيل Service Worker للعمل أوفلاين بعد أول فتحة
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed', err));
        }
    </script>
</body>
</html>
